<html>
<head>
<title>Zloch</title>
<meta charset="utf-8">
</head>
<body> 
<div style="color:red;font-size:50px;"> 
<script> 
var koniec_petli_zlo = prompt("Podaj koniec pętli:", "");
koniec_petli_zlo = parseInt(koniec_petli_zlo);

for (var i_zlo = 2; i_zlo <= koniec_petli_zlo; i_zlo += 2)
{
    document.write("Liczba " + i_zlo + "<br>");
}
</script> 
</div> 
</body> 
</html>
