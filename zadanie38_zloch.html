<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
</head>
<body>
<script>
    var liczba_zlo = prompt("Podaj liczbę do sprawdzenia:", "");
    var x = parseFloat(liczba_zlo);
    
    // Przykładowy warunek: liczba z przedziału (-nieskończoność, 20) lub [50, +nieskończoność)
    if (x < 20 || x >= 50) {
        document.write("liczba należy do przedziału");
    } else {
        document.write("liczba nie należy do przedziału");
    }
</script>
</body>
</html>
