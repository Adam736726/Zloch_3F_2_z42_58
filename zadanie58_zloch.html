<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 58 - Adam Zloch 31</title>
</head>
<body>
    <h2>Zadanie 58 - Adam Zloch 31</h2>
    <div id="wynik" style="font-family: monospace; font-size: 18px; line-height: 1.6;"></div>
    <script>
        let wyjscie = "";
        let licznikLinii = 0;
        for (let i = 0; i < 40; i++) {
            let w = i * i + i + 41;
            wyjscie += "i=" + i + "&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;w(" + i + ")=" + w + "<br>";
            licznikLinii++;
            if (licznikLinii === 5) {
                wyjscie += "<strong style='color: red;'>--- Zatrzymanie ekranu (5 linii) ---</strong><br>";
                licznikLinii = 0;
            }
        }
        document.getElementById("wynik").innerHTML = wyjscie;
    </script>

</body>
</html>
