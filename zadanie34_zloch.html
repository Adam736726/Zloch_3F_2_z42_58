<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
</head>
<body>
<script>

    function User(email, haslo, awatar) {
        this.email = email;
        this.haslo = haslo;
        this.awatar = awatar;
    }

    function UserView(user) {
        this.user = user;
        this.domElement = document.createElement('li');
        this.domElement.innerHTML = '<img src="' + this.user.awatar + '" width="50" height="50"> <a href="mailto:' + this.user.email + '">' + this.user.email + '</a>';
    }


    UserView.prototype.refresh = function() {
        this.domElement.innerHTML = '<img src="' + this.user.awatar + '" width="50" height="50"> <a href="mailto:' + this.user.email + '">' + this.user.email + '</a>';
    };


    var u = new User("adam@zloch.pl", "haslo123", "chomik.jpg");
    var uv = new UserView(u);
    document.body.appendChild(uv.domElement);
</script>
</body>
</html>
