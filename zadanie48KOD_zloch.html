<!DOCTYPE html>   
<head>    
<title>Sprawdzenie danych Zloch </title>    
<meta charset="utf-8">   
</head>  
<body> 
<div style="color:red;font-size:50px;"> 
<script language="JavaScript"> 
do { 
var liczba1=prompt("wysokość =",""); 
var h_zlo=parseFloat(liczba1); 
} 
while ( h_zlo<=0); 
do { 
var liczba1=prompt("podstawę =",""); 
var a_zlo=parseFloat(liczba1); 
} 
while(!( a_zlo>0)); 
var Pole=a_zlo*h_zlo/2; 
document.write("Pole="+Pole.toFixed(2)+" cm^2"+"<br>"); 
</script> 
</div>
