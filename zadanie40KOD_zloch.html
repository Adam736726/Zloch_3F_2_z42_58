<body>
 <form>
 <textarea cols="80" rows="20" readonly>
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
</head>
<body>
    Podaj pierwszą liczbę: <input type="text" id="a"><br>
    Podaj drugą liczbę: <input type="text" id="b"><br><br>
    <input type="button" value="DODAWANIE" onclick="suma_zlo()">
    <input type="button" value="ODEJMOWANIE" onclick="roznica_zlo()">
    <input type="button" value="MNOŻENIE" onclick="iloczyn_zlo()">
    <input type="button" value="DZIELENIE" onclick="iloraz_zlo()"><br><br>
    
    <div id="wynik"></div>

<script>
    function suma_zlo() {
        var a = document.getElementById("a").value;
        var b = document.getElementById("b").value;
        if (a == "" || b == "") {
            document.getElementById("wynik").innerHTML = "Proszę uzupełnić obie liczby.";
        } else {
            var wynik = parseFloat(a) + parseFloat(b);
            document.getElementById("wynik").innerHTML = "Wynik działania wynosi: " + wynik.toFixed(2);
        }
    }

    function roznica_zlo() {
        var a = document.getElementById("a").value;
        var b = document.getElementById("b").value;
        if (a == "" || b == "") {
            document.getElementById("wynik").innerHTML = "Proszę uzupełnić obie liczby.";
        } else {
            var wynik = parseFloat(a) - parseFloat(b);
            document.getElementById("wynik").innerHTML = "Wynik działania wynosi: " + wynik.toFixed(2);
        }
    }

    function iloczyn_zlo() {
        var a = document.getElementById("a").value;
        var b = document.getElementById("b").value;
        if (a == "" || b == "") {
            document.getElementById("wynik").innerHTML = "Proszę uzupełnić obie liczby.";
        } else {
            var wynik = parseFloat(a) * parseFloat(b);
            document.getElementById("wynik").innerHTML = "Wynik działania wynosi: " + wynik.toFixed(2);
        }
    }

    function iloraz_zlo() {
        var a = document.getElementById("a").value;
        var b = document.getElementById("b").value;
        if (a == "" || b == "") {
            document.getElementById("wynik").innerHTML = "Proszę uzupełnić obie liczby.";
        } else if (parseFloat(b) == 0) {
            document.getElementById("wynik").innerHTML = "Nie wolno dzielić przez zero.";
        } else {
            var wynik = parseFloat(a) / parseFloat(b);
            document.getElementById("wynik").innerHTML = "Wynik działania wynosi: " + wynik.toFixed(2);
        }
    }
</script>
</body>
</html>
 </textarea>
 </form>
 <input type="button" value="zamknij okno" onclick="window.close()"/>
</body>
</html>
