<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
</head>
<body>
<script>
    var kolor_zlo = prompt("Podaj kolor (1-czerwony, 2-niebieski):", "");
    
    if (kolor_zlo == "1" || kolor_zlo.toLowerCase() == "czerwony") {
        document.write("<font color='red' size='7'>wczytałeś kolor czerwony</font>");
    } else if (kolor_zlo == "2" || kolor_zlo.toLowerCase() == "niebieski") {
        document.write("<font color='blue' size='1'>wczytałeś kolor niebieski</font>");
    }
</script>
</body>
</html>
